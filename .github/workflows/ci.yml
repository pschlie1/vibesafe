name: CI

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: cp .env.example .env
      - run: npm run db:generate
      - run: npm run ci
