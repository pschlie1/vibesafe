name: Design System Compliance

on:
  pull_request:
    paths:
      - 'src/**'
      - 'eslint-rules/**'
      - 'eslint.config.mjs'
      - 'design-system/**'
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'eslint-rules/**'
      - 'eslint.config.mjs'

jobs:
  design-system:
    name: Design System Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run design-system lint
        run: npm run lint:design-system
        continue-on-error: false
